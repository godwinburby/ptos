# --------------------------------------------------
# PTOS PRESETS
# --------------------------------------------------
# Quick-add shortcuts for frequent records.
# Usage:  ptos --preset <name>
#         ptos --preset <name> field=value   (override a field)
#         ptos --preset <name> --date yesterday
# --------------------------------------------------

[presets.commute]
type     = "expense"
domain   = "self"
category = "transport"
amount   = 90
tag      = ["auto", "bus"]

[presets.snacks]
type     = "expense"
domain   = "home"
category = "household"
tag      = ["snacks"]
# amount omitted — will be prompted each time

[presets.snacksw]
type     = "expense"
domain   = "work"
category = "staff_welfare"
tag      = ["snacks"]
# amount omitted — will be prompted each time

[presets.petrol]
type     = "expense"
domain   = "self"
category = "transport"
amount   = 200
tag      = ["petrol"]

[presets.bakery]
type     = "expense"
domain   = "home"
category = "household"
tag      = ["bakery", "snacks"]
# amount omitted — will be prompted each time

[presets.maid]
type     = "expense"
domain   = "home"
category = "child"
tag      = ["maid"]


[presets.mom_medicine]
type     = "expense"
domain   = "home"
category = "medical"
tag      = ["medicine", "mom"]


[presets.porter]
type     = "expense"
domain   = "work"
category = "postage"
tag      = ["porter"]



[presets.fruits]
type     = "expense"
domain   = "home"
category = "grocery"
tag      = ["fruits"]


[presets.resta]
type     = "expense"
domain   = "self"
category = "food"
amount   = 150
tag      = ["restaurant"]

