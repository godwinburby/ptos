# --------------------------------------------------
# PTOS QUERIES
# --------------------------------------------------
# Usage:
#   ptos --query <n>                 run saved query
#   ptos --query <n> --time lm      override time (td yd tw lw tm lm tq lq ty ly)
#   ptos --query                     list all
# --------------------------------------------------

# --------------------------------------------------
# BASE QUERIES  (used by metrics and dashboards)
# --------------------------------------------------

[assessments]
where = "type=assessment"

[deferred]
where = "type=assessment outcome=deferred"

[prescriptions]
where = "type=prescription"

[binaural]
where = "type=prescription fit=binaural"

# --------------------------------------------------
# METRICS
# --------------------------------------------------

[metrics.prescription_ratio]
ratio = ["prescriptions", "assessments"]

[metrics.binaural_ratio]
ratio = ["binaural", "prescriptions"]

[metrics.asp]
avg = "prescriptions"

[metrics.loss_ratio]
ratio = ["deferred", "assessments"]

# --------------------------------------------------
# DASHBOARDS
# --------------------------------------------------

[dashboards.clinic]
metrics = [
  "assessments",
  "prescriptions",
  "loss_ratio",
  "prescription_ratio",
  "binaural_ratio",
  "asp"
]

# --------------------------------------------------
# CLINIC QUERIES  (use --time lm / tq / lq to switch period)
# --------------------------------------------------

[rx]
where = "type=prescription"
time  = "tm"
sum   = true

[ass]
where = "type=assessment"
time  = "tm"

[flp]
where = "type=followup"
time  = "tm"

# --------------------------------------------------
# EXPENSE QUERIES
# --------------------------------------------------

[exp]
where = "type=expense domain!=work"
time  = "tm"
sum   = true

[exptd]
where = "type=expense domain!=work"
time  = "td"
sum   = true

[self]
where = "type=expense domain=self"
time  = "tm"
sum   = true

[work]
where = "type=expense domain=work tag!=snacks"
time  = "clinic"
sum   = true

[worklm]
where = "type=expense domain=work tag!=snacks"
time  = "clinic-1"
sum   = true

[snacksw]
where = "type=expense domain=work tag=snacks"
time  = "clinic"
sum   = true

[snackswtd]
where = "type=expense domain=work tag=snacks"
time  = "td"
sum   = true

[snackswlm]
where = "type=expense domain=work tag=snacks"
time  = "clinic-1"
sum   = true

# --------------------------------------------------
# ANALYSIS  (use --time to change window)
# --------------------------------------------------

[funnel]
where  = "type=assessment"
time   = "tq"
pivot  = ["source", "outcome"]
count  = true

[rx_models]
where = "type=prescription"
time  = "tq"
pivot = ["model", "source"]
sum   = true

[exp_cat]
where = "type=expense domain!=work"
time  = "tm"
group = ["category"]
sum   = true

# --------------------------------------------------
# DUE CONFIG  (used by: ptos --due)
# --------------------------------------------------

[due]
type    = "followup"
key     = "client"
sort_by = "stage"
days    = 7
