# ==================================================
# PTOS SCHEMA
# ==================================================
#
# HOW TO READ THIS FILE
# ---------------------
# Every type follows the same four-section pattern:
#
#   required   = fields that must be present on every record
#   fields     = what values each field accepts
#   tags       = what tag options appear based on a field value
#   conditions = fields that become required when a condition is met
#
# FIELD OPTIONS — three forms, one keyword:
#
#   # 1. flat list
#   [type.X.fields.Y]
#   options = ["a", "b", "c"]
#
#   # 2. parent-dependent (options change based on another field)
#   [type.X.fields.Y]
#   parent = "Z"
#   options.value1 = ["a", "b"]
#   options.value2 = ["c", "d"]
#
#   # 3. reference a shared definition (no duplication)
#   [type.X.fields.Y]
#   use = "shared.Y"
#
# TAGS — appear in the tag picker based on a field value:
#
#   [type.X.tags.fieldname]
#   options.value1 = ["tag_a", "tag_b"]
#   options.value2 = ["tag_c"]
#
# CONDITIONS — field becomes required when another field equals a value:
#
#   [type.X.conditions.fieldname]
#   when = { other_field = "value" }
#
# ==================================================

# --------------------------------------------------
# RECORD TYPES
# --------------------------------------------------

[types]
allowed = [
  "expense",
  "income",
  "investment",
  "assessment",
  "prescription",
  "fitting",
  "followup",
  "outreach",
  "exercise",
  "conversation",
  "learning"
]

# --------------------------------------------------
# GLOBAL FIELD METADATA
# Controls how fields behave in grouping and analysis
# --------------------------------------------------

[fields.amount]
type         = "int"
dimension    = false
aggregatable = true

[fields.advance]
type         = "int"
dimension    = false
aggregatable = true

[fields.balance]
type         = "int"
dimension    = false
aggregatable = true

[fields.duration]
type         = "int"
dimension    = false
aggregatable = true

[fields.client]
type      = "string"
dimension = false

[fields.name]
type      = "string"
dimension = false

[fields.domain]
type      = "string"
dimension = true

[fields.category]
type      = "string"
dimension = true

[fields.tag]
type      = "string"
dimension = true
multi     = true

# --------------------------------------------------
# SHARED FIELD DEFINITIONS
# Define once, reference with  use = "shared.X"
# --------------------------------------------------

[shared.source]
options = ["raf", "ent", "walkin", "marketing", "camp"]

[shared.booked_by]
options = ["cso", "cce", "cre", "ent"]

[shared.fit]
options = ["monaural", "binaural"]

# ==================================================
# TYPES
# ==================================================

# ----------------------
# EXPENSE
# ----------------------

[type.expense]
required = ["domain", "category", "amount"]

[type.expense.fields.domain]
options = ["self", "home", "work"]

[type.expense.fields.category]
parent         = "domain"
options.self   = ["food", "transport", "medical", "education", "travel", "entertainment", "personal", "household", "utilities"]
options.home   = ["grocery", "utilities", "rent", "maintenance", "child", "religious", "household", "food", "medical", "transport"]
options.work   = ["admin", "books", "electricity", "courier", "postage", "office", "stationary", "staff_welfare", "repair", "maintenance", "transport", "utilities"]

[type.expense.tags.category]
options.food          = ["snacks", "tea", "coffee", "restaurant", "bakery", "fruits"]
options.transport     = ["auto", "bus", "metro", "taxi", "uber", "rapido", "petrol"]
options.grocery       = ["vegetables", "milk", "rice", "fruits", "super_market", "quick_delivery"]
options.household     = ["bakery", "snacks", "restaurant"]
options.staff_welfare = ["snacks"]

# ----------------------
# INCOME
# ----------------------

[type.income]
required = ["source", "amount"]

[type.income.fields.source]
options = ["salary", "extra"]

[type.income.tags.source]
options.salary = ["bonus", "commission"]
options.extra  = ["gift", "refund"]

# ----------------------
# INVESTMENT
# ----------------------

[type.investment]
required = ["instrument", "provider", "amount"]

[type.investment.fields.instrument]
options = ["rd", "fd", "mutual_fund", "ppf"]

[type.investment.fields.provider]
options = ["hdfc_bank", "hdfc_mf", "motilal_oswald_mf", "cordial_gramin"]

[type.investment.tags.instrument]
options.mutual_fund = ["sip", "lumpsum"]

# ----------------------
# ASSESSMENT
# ----------------------

[type.assessment]
required = ["client", "name", "source", "outcome", "booked_by"]

[type.assessment.fields.source]
use = "shared.source"

[type.assessment.fields.outcome]
options = ["normal", "deferred", "prescribed"]

[type.assessment.fields.fit]
use = "shared.fit"

[type.assessment.fields.booked_by]
use = "shared.booked_by"

[type.assessment.conditions.fit]
when = { outcome = "prescribed" }

# ----------------------
# PRESCRIPTION
# ----------------------

[type.prescription]
required = ["client", "name", "model", "fit", "amount", "source", "booked_by"]

[type.prescription.fields.source]
use = "shared.source"

[type.prescription.fields.booked_by]
use = "shared.booked_by"

[type.prescription.fields.fit]
use = "shared.fit"

[type.prescription.fields.model]
options = [
  "lumity_l30_rkit",
  "lumity_l50_rkit",
  "nexia_4_bte_r"
]

# ----------------------
# FITTING
# ----------------------

[type.fitting]
required = ["client", "name", "model", "balance", "fit"]

[type.fitting.fields.fit]
use = "shared.fit"

# model is free text for fitting (no fixed list)

# ----------------------
# FOLLOWUP
# ----------------------

[type.followup]
required = ["client", "name", "stage", "result"]

[type.followup.fields.stage]
options = [
  "trial", "decision", "assessment",
  "cant_afford", "upgrade", "wants_emi",
  "deferred", "current_aid_ok", "unattended"
]

[type.followup.fields.channel]
options = ["phone", "whatsapp", "visit"]

[type.followup.fields.result]
options = [
  "not_interested", "need_time", "busy",
  "not_reachable", "wrong_number", "does_not_exist",
  "out_of_station", "ringing", "another_provider",
  "deceased", "not_well", "not_available",
  "busy_call_later", "out_of_service", "current_aid_ok"
]

# tags that appear when stage = trial
[type.followup.tags.stage]
options.trial = ["aid"]

# ----------------------
# OUTREACH
# ----------------------

[type.outreach]
required = ["place", "name", "outcome"]

[type.outreach.fields.place]
options = ["medical_shop", "clinic", "camp"]

[type.outreach.fields.outcome]
options = ["referral", "visit", "no_response"]

# ----------------------
# EXERCISE
# ----------------------

[type.exercise]
required = ["activity", "duration"]

[type.exercise.fields.activity]
options = ["walk", "stretch", "strength", "cycle"]

# tags that appear when activity = walk
[type.exercise.tags.activity]
options.walk = ["morning", "evening"]

# ----------------------
# CONVERSATION
# ----------------------

[type.conversation]
required = ["relation", "person", "topic", "mood", "duration", "outcome"]

[type.conversation.fields.relation]
options = ["wife", "child", "family", "friend", "colleague", "neighbour", "stranger"]

[type.conversation.fields.topic]
options = [
  "money", "borrow", "family", "health", "work",
  "parenting", "planning", "relationship", "ideas",
  "problem", "spiritual", "social"
]

[type.conversation.fields.mood]
options = ["positive", "neutral", "supportive", "tense", "conflict"]

[type.conversation.fields.outcome]
options = ["none", "pending", "agreed", "refused", "followup"]

# ----------------------
# LEARNING
# ----------------------

[type.learning]
required = ["topic"]

[type.learning.fields.source]
options = ["youtube", "podcast", "course", "article", "book", "audio_book"]

[type.learning.fields.domain]
options = ["self", "work"]
